version: "3.8"

services:
  api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=models/LogisticRegression.pkl
    depends_on:
      - mlflow
    volumes:
      - ./models:/app/models

  mlflow:
    image: python:3.11-slim
    container_name: churn-mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow==2.13.0 &&
               mlflow server --host 0.0.0.0 --port 5000"
    volumes:
      - ./mlruns:/mlruns