name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install DVC with GCS support
        run: pip install dvc dvc-gs

      - name: Authenticate to Google Cloud
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > /tmp/gcs_credentials.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs_credentials.json" >> $GITHUB_ENV

      - name: Pull data and models from GCS
        run: dvc pull

      - name: Run unit tests
        run: pytest tests/ -v -m "unit" --tb=short

      - name: Run integration tests
        run: pytest tests/ -v -m "integration" --tb=short